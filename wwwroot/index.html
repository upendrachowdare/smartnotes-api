<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SmartNotes - Applications Dashboard</title>
</head>
<body>
  <h1>Applications Dashboard</h1>
  <div id="list"></div>
  <script>
    async function load() {
      const res = await fetch('/api/applications');
      const items = await res.json();
      const container = document.getElementById('list');
      container.innerHTML = '';
      items.forEach(i => {
        const div = document.createElement('div');
        div.style.border = '1px solid #ccc';
        div.style.padding = '8px';
        div.style.margin = '8px';
        div.innerHTML = `<strong>${i.jobId}</strong> - ${new Date(i.attemptedAt).toLocaleString()} - Success: ${i.success}<br/>${i.details || ''}`;
        if (!i.success) {
          const btn = document.createElement('button');
          btn.textContent = 'Approve';
          btn.onclick = async () => {
            const r = await fetch('/api/applications/approve/' + i.id, { method: 'POST' });
            if (r.ok) load(); else alert('Failed');
          };
          div.appendChild(btn);
        }
        container.appendChild(div);
      });
    }
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
